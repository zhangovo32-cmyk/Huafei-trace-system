<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="renderer" content="webkit">
    <meta name="x5-page-mode" content="app">
    <meta name="browsermode" content="application">
    <title>云天化产品二维码追溯系统</title>
    <link rel="stylesheet" href="/styles.css?v=20260626-7">
  </head>
  <body class="check-body">
    <main class="verify-shell">
      <header class="brand-hero" aria-label="品牌区">
        <div class="brand-row">
          <img class="brand-logo brand-logo-image" src="/assets/logo-yuntianhua.png" alt="云天化集团">
          <div class="brand-wordmark" aria-label="云天化股份">
            <strong>云天化股份</strong>
            <span>YUNTIANHUA CO.,LTD</span>
          </div>
        </div>

        <img class="factory-line" src="/assets/factory-line-full.svg" alt="">
      </header>

      <section class="verify-panel" id="verifyPanel">
        <h1>云天化产品二维码追溯系统</h1>
        <p class="code-line">防伪编码：<strong id="codeText">读取中</strong></p>
        <p class="scan-line">当前产品已浏览过 <strong id="scanCount">0</strong> 次</p>
        <p class="message-line" id="resultMessage">正在连接防伪中心...</p>
        <p class="time-line">认证时间：<span id="certifiedTime">--</span></p>
      </section>

      <section class="state-card is-hidden" id="stateCard">
        <strong id="stateTitle">核验提示</strong>
        <p id="stateDetail"></p>
      </section>

      <section class="product-card is-loading" id="productCard" aria-label="产品信息">
        <div class="product-media">
          <img id="productImage" alt="产品图片" loading="lazy" decoding="async" fetchpriority="low" hidden>
          <div class="bag-placeholder" id="productFallback" aria-hidden="true">
            <div class="bag-top"></div>
            <div class="bag-label">
              <span>三环</span>
              <strong>PRODUCT</strong>
              <em>25 kg</em>
            </div>
          </div>
        </div>

        <div class="product-info">
          <p><strong>品牌：</strong><span id="productBrand">--</span></p>
          <p><strong>产品名称：</strong><span id="productName">--</span></p>
          <p class="field-block"><strong>主要技术指标：</strong><span id="productSpecs">--</span></p>
          <p><strong>净重：</strong><span id="productWeight">--</span></p>
          <p><strong>生产批号：</strong><span id="productBatch">--</span></p>
          <p><strong>生产日期：</strong><span id="productDate">--</span></p>
          <p><strong>生产商：</strong><span id="productMaker">--</span></p>
          <button class="more-link" id="moreButton" type="button">点击查看更多...</button>
        </div>
      </section>

      <section class="product-detail is-hidden" id="productDetail"></section>

      <section class="promo-banner" aria-label="活动入口">
        <div>
          <strong>种植服务活动入口</strong>
          <span>登记作物信息，获取专属技术建议</span>
        </div>
      </section>

      <section class="entry-grid" aria-label="功能入口">
        <a class="entry-tile tile-green" href="javascript:void(0)">
          <span>云天化种植技术交流群</span>
          <i aria-hidden="true"></i>
        </a>
        <a class="entry-tile tile-cyan" href="javascript:void(0)">
          <span>作物解决方案</span>
          <i aria-hidden="true"></i>
        </a>
      </section>

      <a class="trace-action trace-inquiry" href="javascript:void(0)" onclick="alert('已认证'); return false;">
        <span>真伪查询</span>
        <i aria-hidden="true">
          <svg viewBox="0 0 100 100" focusable="false">
            <rect x="8" y="8" width="84" height="84"></rect>
            <circle cx="44" cy="42" r="19"></circle>
            <path d="M58 56 L78 76"></path>
          </svg>
        </i>
      </a>

      <section class="trace-section trace-video" aria-label="热点视频">
        <div class="trace-section-title">
          <span class="trace-section-icon video-icon" aria-hidden="true"></span>
          <strong>热点视频</strong>
        </div>
        <div class="trace-video-card video-card-company">
          <span>企业宣传视频</span>
          <i aria-hidden="true">▶</i>
        </div>
        <div class="trace-video-card video-card-product">
          <span>产品宣传视频</span>
          <i aria-hidden="true">▶</i>
        </div>
      </section>

      <section class="trace-section trace-qrcode" aria-label="扫码关注">
        <div class="trace-section-title">
          <span class="trace-section-icon qrcode-icon" aria-hidden="true"></span>
          <strong>扫码关注</strong>
        </div>
        <div class="trace-qr-list">
          <div>
            <span>云天化农分享公众号</span>
            <div class="qr-placeholder" aria-hidden="true"></div>
          </div>
          <div>
            <span>云天化农分享微信视频号</span>
            <div class="qr-placeholder alt" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <a class="contact-us" href="javascript:void(0)">联系我们</a>
      <footer class="trace-footer">© 云南云天化股份有限公司</footer>
      <a class="more-float" href="javascript:void(0)" aria-label="更多">
        <i aria-hidden="true">•••</i>
        <span>更多</span>
      </a>
    </main>

    <script src="/app.js?v=20260626-7" defer></script>
  </body>
</html>
