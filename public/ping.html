<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>访问诊断</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        background: #f6f8fb;
      }
      main {
        width: min(100%, 420px);
        padding: 24px;
        border: 1px solid #dbe4ef;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        color: #1a6bc8;
        font-size: 24px;
      }
      p {
        margin: 10px 0;
        font-size: 15px;
        line-height: 1.7;
      }
      code {
        padding: 2px 5px;
        border-radius: 4px;
        background: #eef4ff;
      }
      a {
        color: #1a6bc8;
        font-weight: 700;
      }
      .ok {
        margin-top: 18px;
        padding: 12px;
        border-radius: 8px;
        color: #166534;
        background: #ecfdf3;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>静态访问正常</h1>
      <p>如果 WiFi 能打开这一页，说明 <code>pages.dev</code> 域名和静态资源至少可以访问。</p>
      <p>下一步测试接口：<a href="/api/ping">/api/ping</a></p>
      <p>再测试防伪接口：<a href="/api/check/7532087070511313">/api/check/7532087070511313</a></p>
      <div class="ok">当前页面不加载图片、不访问数据库，专门用于排查网络。</div>
    </main>
  </body>
</html>
